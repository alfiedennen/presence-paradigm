# secrets.example.yaml
#
# Reference template for the secrets your HA + ESPHome installs need.
# Copy to your ESPHome add-on's `secrets.yaml` (and/or to your HA
# `secrets.yaml` for the trilateration / template-sensor side).
#
# DO NOT commit your filled-in version — `secrets.yaml` should be in
# `.gitignore` (it is, by default, in the HA + ESPHome standard layout).

# ── WiFi (used by every ESPHome board) ─────────────────────────────
wifi_ssid: "your-wifi-network-name"
wifi_password: "your-wifi-password"

# ── ESPHome API + OTA (shared across all presence boards) ──────────
# Generate a 32-byte base64 key for the API encryption:
#   openssl rand -base64 32
# Use a strong long random password for OTA — this also doubles as
# the AP-fallback password if the board can't reach WiFi.
presence_node_api_key: "REPLACE_WITH_OUTPUT_OF_openssl_rand_base64_32"
presence_node_ota_password: "REPLACE_WITH_A_STRONG_RANDOM_PASSWORD"
