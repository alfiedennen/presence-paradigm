# Presence node with mmWave radar — BLE proxy + LD2450 combined.
#
# Use this variant in rooms where you want fine-grained body-position
# presence in addition to BLE-IRK identity. The same ESP32 acts as the
# BLE proxy AND drives the LD2450 over UART.
#
# Hardware:
#   - 1× ESP32 dev board (DevKit V1 / NodeMCU-32S clone, ~£6)
#   - 1× HLK-LD2450 24 GHz mmWave radar (~£9)
#   - 4 jumper wires (5V, GND, TX, RX)
#
# IMPORTANT — power: the LD2450 needs 5V, but most ESP32 DevKit V1 clones'
# VIN pin doesn't pass through USB 5V (only the 3.3V regulator's input
# is exposed). See docs/gotchas.md → "ESP32 DevKit V1 VIN pin trap".
# Workarounds: power the LD2450 from a separate USB → 5V breakout, OR
# tap directly into the USB connector's 5V pin on the board, OR switch
# to an ESP32 board that does pass through 5V on VIN (XIAO ESP32-S3,
# Lolin S3 Mini, etc).
#
# IMPORTANT — wiring colour: HLK ships the LD2450 with a 4-pin JST
# connector + flying leads. The colour scheme is NON-STANDARD compared
# to most "5V red, GND black" conventions. See docs/gotchas.md →
# "LD2450 cable colour trap" before connecting.

substitutions:
  name: presence-room-radar
  friendly_name: "Presence Node — Room (with radar)"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  min_version: 2024.11.0

esp32:
  board: esp32dev
  framework:
    type: arduino

# ── External component for HLK-LD2450 ───────────────────────────────
# 24 GHz mmWave radar, up to 3 targets with X/Y/velocity at 10 Hz.
# Mainline ESPHome added support in 2024 — if the built-in `ld2450`
# platform resolves cleanly for you, remove this external_components
# block. We keep screek-workshop's fork pinned because it's the most
# battle-tested and exposes the zone/target_region features.
external_components:
  - source: github://screek-workshop/ld2450_esphome@main
    components: [ ld2450 ]

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret presence_node_api_key

ota:
  - platform: esphome
    password: !secret presence_node_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name}"
    password: !secret presence_node_ota_password

captive_portal:

# ── BLE side (same as the BLE-only variant) ─────────────────────────
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# ── UART for LD2450 radar ───────────────────────────────────────────
# Default LD2450 baud = 256000. GPIO16/17 are safe choices on classic
# ESP32 — they avoid the PSRAM conflict on PSRAM-equipped boards and
# leave UART0 (GPIO1/3) free for USB logging/flashing. Swap if your
# specific dev board reserves 16/17 for something else.
uart:
  id: ld2450_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2450:
  uart_id: ld2450_uart
  id: ld2450_radar
  throttle: 1000ms   # Native 10 Hz; throttle to 1 Hz for HA API health
                     # while wiring up the rest of the stack. Drop to
                     # 250ms or 100ms once your fusion sensor consumes it.

binary_sensor:
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Radar Presence"
    has_moving_target:
      name: "Radar Moving"
    has_still_target:
      name: "Radar Still"

sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # ── Per-beacon RSSI (same as BLE-only variant) ──────────────────────
  - platform: ble_rssi
    ibeacon_uuid: "<watch-uuid>"
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "Watch RSSI"
    filters:
      - heartbeat: 2s
      - timeout:
          timeout: 15s
          value: -127

  - platform: ble_rssi
    ibeacon_uuid: "<phone-uuid>"
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "Phone RSSI"
    filters:
      - heartbeat: 2s
      - timeout:
          timeout: 15s
          value: -127

  # ── Radar outputs: per-target X/Y/speed + target count ──────────────
  # Coordinates in mm from the radar's own frame:
  #   +X = right of the module when looking at the antenna face
  #   +Y = forward (away from the antenna face)
  #   speed: mm/s, signed (positive = moving away, negative = approaching)
  # Use docs/calibrate.md to translate from the radar's frame to your
  # house's coordinate frame (rotation + offset per board).
  - platform: ld2450
    ld2450_id: ld2450_radar
    target_count:
      name: "Target Count"
    target_1:
      x:
        name: "T1 X"
      y:
        name: "T1 Y"
      speed:
        name: "T1 Speed"
      distance:
        name: "T1 Distance"
      angle:
        name: "T1 Angle"
    target_2:
      x:
        name: "T2 X"
      y:
        name: "T2 Y"
      speed:
        name: "T2 Speed"
      distance:
        name: "T2 Distance"
    target_3:
      x:
        name: "T3 X"
      y:
        name: "T3 Y"
      speed:
        name: "T3 Speed"
      distance:
        name: "T3 Distance"

# ── Optional: zone polygons for room-specific automations ────────────
# Once you've calibrated the radar's frame against your room layout,
# define polygons here for "at desk", "at sofa", "in doorway", etc.
# The LD2450 component fires `binary_sensor.<zone>_present` for each.
# See docs/calibrate.md for how to derive the polygon coordinates from
# a sit/walk trace.
#
# zone:
#   - name: "Desk"
#     polygon:
#       - { x: -1500, y:  200 }
#       - { x:  -300, y:  200 }
#       - { x:  -300, y: 1400 }
#       - { x: -1500, y: 1400 }
